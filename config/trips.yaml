defaults:
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled

hydra:
  job:
    chdir: false
  output_subdir: null
  run:
    dir: .

frame_selection:
  _target_: model.base.uniform_sampling
  _partial_: true
  # Keep frame sampling aligned with base.yaml for a fair base-vs-TRIPS comparison.
  num_frames: 10
  max_side: 720
  ensure_qwen_compatibility: true

patch_selection_v1:
  _target_: model.PatchSelection.TRIPS.trips_selection.trips_patch_selection
  _partial_: true
  query_file: ${invoke.query_file}
  clip_model_name: "openai/clip-vit-base-patch16"
  clip_dtype: "bf16"
  clip_do_center_crop: false # false면 CLIP dense score를 full-frame 기준으로 계산
  # Prioritize LLM Tok/s by keeping very few attentive tokens.
  keep_ratio: 0.03
  attentive_budget: null
  max_attentive_budget: 4
  patch_score_threshold: null
  patch_score_threshold_low: 0.01
  patch_score_threshold_high: 0.06
  score_pooling: "naive_mean"
  window_size: 4
  window_stride: 2
  aggregation: "max"
  batch_size: ${frame_selection.num_frames}
  spatial_merge_size: null
  fuse_strategy: "mean"
  fuse_scope: "global"
  device: null

patch_selection_v2:
  _target_: model.PatchSelection.TRIPS.trips_budget_selection.budget_fuse_patch_selection
  _partial_: true
  query_file: ${invoke.query_file}
  clip_model_name: "openai/clip-vit-base-patch16"
  clip_dtype: "bf16"
  clip_do_center_crop: false # false면 CLIP dense score를 full-frame 기준으로 계산
  total_budget: null
  keep_ratio: 0.05
  temperature: 0.4
  selection_mode: "naive_mean"
  window_size: 4
  window_stride: 2
  aggregation: "max"
  batch_size: ${frame_selection.num_frames}
  spatial_merge_size: null
  fuse_strategy: "mean"
  device: null

vlm:
  _target_: model.base.BaseVLM
  model_id: "Qwen/Qwen3-VL-8B-Instruct"
  backend: "qwen3_vl"
  dtype: "bf16"
  quantization:
    enabled: false
    mode: "4bit"
    skip_vision_encoder: true
    skip_modules: []
    kwargs:
      bnb_4bit_compute_dtype: "bf16"
      bnb_4bit_quant_type: "nf4"
      bnb_4bit_use_double_quant: true
      llm_int8_threshold: 6.0
      llm_int8_enable_fp32_cpu_offload: false
  frame_selector: ${frame_selection}
  patch_selector: ${patch_selection_v2}
  duplicate_factor: 2 # 1이면 프레임 복사 비활성
  duplicate_for_qwen_only: true
  processor_kwargs: {}
  model_kwargs: {}
  local_model_dir: "./model/repo"
  generation_kwargs:
    do_sample: false
    max_new_tokens: 128

invoke:
  video_path: "./data/Mcst74e8S9U.mp4"
  prompt_file: "model/base/prompt.txt"
  query_file: "model/base/query.txt"
  print_config: false
  quiet_model_loading: false
