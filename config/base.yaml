defaults:
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled

hydra:
  job:
    chdir: false
  output_subdir: null
  run:
    dir: .

# 프레임 셀렉션 함수 설정, 함수를 정의한 다음 옵션을 여기서 자유롭게 정의 가능, 
# 필수인자로 video_path를 받도록 구현해야 함
frame_selection: 
  _target_: model.base.uniform_sampling
  _partial_: true
  num_frames: 10
  max_side: 720
  ensure_qwen_compatibility: true

patch_selection: null

vlm:
  _target_: model.base.BaseVLM
  model_id: "Qwen/Qwen3-VL-8B-Instruct"
  backend: "qwen3_vl" # 현재 프로젝트의 기준 VLM 백엔드
  dtype: "bf16" # Enum[ bf16 | fp16 | fp32 ]
  quantization:
    enabled: true # true면 bitsandbytes 양자화 활성화 (CUDA 필요)
    mode: "4bit" # 4bit는 메모리 절감, 8bit는 정확도/안정성에 더 유리한 편
    skip_vision_encoder: true # vision encoder는 성능 저하 방지를 위해 기본적으로 제외
    skip_modules: [] # 추가 제외 모듈명 리스트 (예: ["multi_modal_projector"])
    kwargs: # BitsAndBytesConfig로 그대로 전달되는 세부 옵션
      bnb_4bit_compute_dtype: "bf16" # 4bit 연산 시 내부 계산 dtype
      bnb_4bit_quant_type: "nf4" # 4bit quant 타입 (nf4/fp4)
      bnb_4bit_use_double_quant: true # 2중 양자화로 메모리 추가 절약
      llm_int8_threshold: 6.0 # 8bit 모드에서 outlier 처리 임계값
      llm_int8_enable_fp32_cpu_offload: false # 8bit 모드에서 CPU fp32 오프로딩 사용 여부
  frame_selector: ${frame_selection}
  patch_selector: ${patch_selection}
  processor_kwargs: {} # 전처리기 로드시 .from_pretrained() 옵션 설정
  model_kwargs: {} # 모델 로드시 .from_pretrained() 옵션 설정
  local_model_dir: "./model/repo"
  generation_kwargs: # 생성시점 옵션, 출력 샘플링 / 온도 설정 / top_p등 설정 가능
    do_sample: false
    # top_p: 0.8
    max_new_tokens: 128

invoke: 
  video_path: "./data/Mcst74e8S9U.mp4"
  prompt_file: "model/base/prompt.txt"
  query_file: "model/base/query.txt"
  print_config: false # 현재 yaml 파일 내용 출력 여부
  quiet_model_loading: false # Hugging Face/transformers 모델 로딩 로그 및 progress bar 숨김
