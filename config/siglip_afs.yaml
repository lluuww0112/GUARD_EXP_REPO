defaults:
  - base
  - _self_

frame_selection:
  _target_: model.FrameSelection.SigLIPAFS.siglip_adaptive_frame_sampling
  _partial_: true
  query_file: ${invoke.query_file}
  num_frames: 10
  min_candidate_frames: 48
  max_candidate_frames: 128
  candidate_sampling_strategy: "global_uniform" # Enum["global_uniform", "segment_uniform"]
  segment_count: 16
  preselection_top_k: 32
  visual_similarity_threshold: 0.9
  temporal_suppression_seconds: 2.0
  auxiliary_redundancy_metric: "null" # Enum["null", "sfvd", "ssvd"]
  auxiliary_redundancy_weight: 0.15
  max_side: 720
  ensure_qwen_compatibility: true
  qwen_factor: 28
  enable_soft_weighting: false

patch_selection: null

vlm:
  _target_: model.FrameSelection.SigLIPAFS.vlm.SigLIPAFSVLM
  model_id: "Qwen/Qwen3-VL-8B-Instruct"
  backend: "qwen3_vl"
  dtype: "bf16"
  quantization:
    enabled: true
    mode: "4bit"
    skip_vision_encoder: true
    skip_modules: []
    kwargs:
      bnb_4bit_compute_dtype: "bf16"
      bnb_4bit_quant_type: "nf4"
      bnb_4bit_use_double_quant: true
      llm_int8_threshold: 6.0
      llm_int8_enable_fp32_cpu_offload: false
  frame_selector: ${frame_selection}
  patch_selector: ${patch_selection}
  duplicate_factor: 1
  duplicate_for_qwen_only: true
  processor_kwargs: {}
  model_kwargs: {}
  local_model_dir: "./model/repo"
  generation_kwargs:
    do_sample: false
    max_new_tokens: 128
  embedding_model_id: "google/siglip-so400m-patch14-384"
  embedding_dtype: "bf16"
  embedding_processor_kwargs: {}
  embedding_model_kwargs: {}
  embedding_local_model_dir: "./model/repo"

invoke:
  video_path: "./data/Mcst74e8S9U.mp4"
  prompt_file: "model/base/prompt.txt"
  query_file: "model/base/query.txt"
  print_config: false
  quiet_model_loading: false
