defaults:
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled

hydra:
  job:
    chdir: false
  output_subdir: null
  run:
    dir: .

frame_selection:
  _target_: model.base.uniform_sampling
  _partial_: true
  num_frames: 10
  max_side: 720
  ensure_qwen_compatibility: true

patch_selection_v1:
  _target_: model.PatchSelection.DenseDPS.selection_v1.maskclip_patch_selection
  _partial_: true
  query_file: ${invoke.query_file}
  clip_model_name: "openai/clip-vit-large-patch14"
  clip_dtype: "bf16"
  clip_do_center_crop: false # false면 CLIP dense score를 full-frame 기준으로 계산
  keep_ratio: 0.3
  selection_mode: "naive_mean" # Enum["naive_mean" | "sliding_window"], naive_mean -> 단순 평균 산출, sliding_window -> 경계 정보 보전하며 윈도우 슬라이딩으로 패치 스코어 산출
  window_size: 4
  window_stride: 2 
  aggregation: "max" # 다중 쿼리 집계 방식, Enum["max" | "mean"]
  batch_size: ${frame_selection.num_frames}
  spatial_merge_size: null # qwen-vl의 merge 사이즈를 명시적으로 맞추는 옵션, null로 하면 기본 크기인 2로 설정
  device: null


patch_selection_v2: # 프레임 중요도에 따른 budget 분배
  _target_: model.PatchSelection.DenseDPS.selection_v2.maskclip_patch_selection
  _partial_: true
  query_file: ${invoke.query_file}
  clip_model_name: "openai/clip-vit-large-patch14"
  clip_dtype: "bf16"
  clip_do_center_crop: false # false면 CLIP dense score를 full-frame 기준으로 계산
  total_budget: null # null이면 keep_ratio * 전체 merged token 수로 총 예산 산출
  keep_ratio: 0.3
  temperature: 0.4 # 작을수록 high-score frame에 budget 집중, 상위 프레임만 강하게 주려면 0.1~0.2정도
  selection_mode: "naive_mean"
  window_size: 4
  window_stride: 2
  aggregation: "max" # dense patch score와 frame importance score 모두에 적용
  batch_size: ${frame_selection.num_frames}
  spatial_merge_size: null
  device: null


patch_selection_v3: # threshold 기반 eligible patch만 남기고 leftover budget 재분배
  _target_: model.PatchSelection.DenseDPS.selection_v3.maskclip_patch_selection
  _partial_: true
  query_file: ${invoke.query_file}
  clip_model_name: "openai/clip-vit-large-patch14"
  clip_dtype: "bf16"
  clip_do_center_crop: false # false면 CLIP dense score를 full-frame 기준으로 계산
  total_budget: null # null이면 keep_ratio * 전체 merged token 수로 총 예산 산출
  keep_ratio: 0.3
  temperature: 0.4 # 작을수록 high-score frame에 budget 집중, 상위 프레임만 강하게 주려면 0.1 ~ 0.2정도
  patch_score_threshold: 0.01 # raw cosine threshold, null 불가, 예: 0.0 / 0.1 / 0.2
  selection_mode: "naive_mean"
  window_size: 4
  window_stride: 2
  aggregation: "max" # dense patch score와 frame importance score 모두에 적용
  batch_size: ${frame_selection.num_frames}
  spatial_merge_size: null
  device: null


patch_selection_v4: # threshold를 먼저 capacity로 반영한 one-pass budget allocation
  _target_: model.PatchSelection.DenseDPS.selection_v4.maskclip_patch_selection
  _partial_: true
  query_file: ${invoke.query_file}
  clip_model_name: "openai/clip-vit-large-patch14"
  clip_dtype: "bf16"
  clip_do_center_crop: false # false면 CLIP dense score를 full-frame 기준으로 계산
  total_budget: null # null이면 keep_ratio * 전체 merged token 수로 총 예산 산출
  keep_ratio: 0.3
  temperature: 0.4 # 작을수록 high-score frame에 budget 집중
  patch_score_threshold: 0.01 # raw cosine threshold, null 불가, 예: 0.0 / 0.1 / 0.2
  selection_mode: "naive_mean"
  window_size: 4
  window_stride: 2
  aggregation: "max" # dense patch score와 frame importance score 모두에 적용
  batch_size: ${frame_selection.num_frames}
  spatial_merge_size: null
  device: null


vlm:
  _target_: model.base.BaseVLM
  model_id: "Qwen/Qwen3-VL-8B-Instruct"
  backend: "qwen3_vl"
  dtype: "bf16"
  quantization:
    enabled: false
    mode: "4bit"
    skip_vision_encoder: true
    skip_modules: []
    kwargs:
      bnb_4bit_compute_dtype: "bf16"
      bnb_4bit_quant_type: "nf4"
      bnb_4bit_use_double_quant: true
      llm_int8_threshold: 6.0
      llm_int8_enable_fp32_cpu_offload: false
  frame_selector: ${frame_selection}
  patch_selector: ${patch_selection_v4}
  duplicate_factor: 2 # 1이면 프레임 복사 비활성
  duplicate_for_qwen_only: true
  processor_kwargs: {}
  model_kwargs: {}
  local_model_dir: "./model/repo"
  generation_kwargs:
    do_sample: false
    # top_p: 0.8
    max_new_tokens: 128

invoke:
  video_path: "./data/Mcst74e8S9U.mp4"
  prompt_file: "model/base/prompt.txt"
  query_file: "model/base/query.txt"
  print_config: false
  quiet_model_loading: false
