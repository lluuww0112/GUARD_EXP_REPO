defaults:
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled

hydra:
  job:
    chdir: false
  output_subdir: null
  run:
    dir: .

frame_selection:
  _target_: model.base.uniform_sampling
  _partial_: true
  num_frames: 10
  max_side: 720
  ensure_qwen_compatibility: true

patch_selection:
  _target_: model.PatchSelection.selection.maskclip_patch_selection
  _partial_: true
  query_file: ${invoke.query_file}
  clip_model_name: "openai/clip-vit-base-patch16"
  clip_dtype: "bf16"
  keep_ratio: 0.075
  selection_mode: "merge" # Enum["merge" | "sliding_window"], merge -> 단순 평균 산출, sliding_window -> 경계 정보 보전하며 윈도우 슬라이딩으로 패치 스코어 산출
  window_size: 2
  window_stride: 1
  aggregation: "max" # 다중 쿼리 집계 방식, Enum["max" | "mean"]
  batch_size: ${frame_selection.num_frames}
  spatial_merge_size: null # qwen-vl의 merge 사이즈를 명시적으로 맞추는 옵션, null로 하면 기본 크기인 2로 설정
  device: null


vlm:
  _target_: model.base.BaseVLM
  model_id: "Qwen/Qwen3-VL-8B-Instruct"
  backend: "qwen3_vl"
  dtype: "bf16"
  quantization:
    enabled: true
    mode: "4bit"
    skip_vision_encoder: true
    skip_modules: []
    kwargs:
      bnb_4bit_compute_dtype: "bf16"
      bnb_4bit_quant_type: "nf4"
      bnb_4bit_use_double_quant: true
      llm_int8_threshold: 6.0
      llm_int8_enable_fp32_cpu_offload: false
  frame_selector: ${frame_selection}
  patch_selector: ${patch_selection}
  processor_kwargs: {}
  model_kwargs: {}
  local_model_dir: "./model/repo"
  generation_kwargs:
    do_sample: false
    # top_p: 0.8
    max_new_tokens: 128

invoke:
  video_path: "./data/Mcst74e8S9U.mp4"
  prompt_file: "model/base/prompt.txt"
  query_file: "model/base/query.txt"
  print_config: false
  quiet_model_loading: false
