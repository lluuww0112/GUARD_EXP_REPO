defaults:
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled

hydra:
  job:
    chdir: false
  output_subdir: null
  run:
    dir: .

frame_selection:
  _target_: model.FrameSelection.DPC.dpc_sampling
  _partial_: true
  query_file: ${invoke.query_file}
  threshold: 10 # 반복적 클러스터링 종료 조건 (고연관성 프레임 갯수)
  tau: 0.2 # 고연관성 프레임 판단 조건 ( cos 유사도 결정값 )
  k_set: [10, 15, 20] # 반복적 클러스터링시 사용할 군집수
  dpc_pool_size: 512 # 초반 균등 샘플링용 프레임 수
  kneighbor_count: 5 # density 계산을 위해 사용하는 이웃 수
  clip_model_name: "openai/clip-vit-large-patch14"
  clip_dtype: "bf16"
  aggregation: "max"
  cache_dense_scores: true
  batch_size: 512
  max_side: 720
  ensure_qwen_compatibility: true
  qwen_factor: 28
  device: null

patch_selection_v1:
  _target_: model.PatchSelection.DenseDPS.selection_v1.maskclip_patch_selection
  _partial_: true
  query_file: ${invoke.query_file}
  clip_model_name: "openai/clip-vit-large-patch14"
  clip_dtype: "bf16"
  clip_do_center_crop: false # false면 CLIP dense score를 full-frame 기준으로 계산
  keep_ratio: 0.3
  selection_mode: "naive_mean" # Enum["naive_mean" | "sliding_window"]
  window_size: 4
  window_stride: 2
  aggregation: "max"
  batch_size: ${frame_selection.threshold}
  spatial_merge_size: null
  device: null

patch_selection_v2:
  _target_: model.PatchSelection.DenseDPS.selection_v2.maskclip_patch_selection
  _partial_: true
  query_file: ${invoke.query_file}
  clip_model_name: "openai/clip-vit-large-patch14"
  clip_dtype: "bf16"
  clip_do_center_crop: false # false면 CLIP dense score를 full-frame 기준으로 계산
  total_budget: null
  keep_ratio: 0.3
  temperature: 0.4
  selection_mode: "naive_mean"
  window_size: 4
  window_stride: 2
  aggregation: "max"
  batch_size: ${frame_selection.threshold}
  spatial_merge_size: null
  device: null

patch_selection_v3:
  _target_: model.PatchSelection.DenseDPS.selection_v3.maskclip_patch_selection
  _partial_: true
  query_file: ${invoke.query_file}
  clip_model_name: "openai/clip-vit-large-patch14"
  clip_dtype: "bf16"
  clip_do_center_crop: false # false면 CLIP dense score를 full-frame 기준으로 계산
  total_budget: null
  keep_ratio: 0.3
  temperature: 0.4
  patch_score_threshold: 0.01
  selection_mode: "naive_mean"
  window_size: 4
  window_stride: 2
  aggregation: "max"
  batch_size: ${frame_selection.threshold}
  spatial_merge_size: null
  device: null

patch_selection_v4:
  _target_: model.PatchSelection.DenseDPS.selection_v4.maskclip_patch_selection
  _partial_: true
  query_file: ${invoke.query_file}
  clip_model_name: "openai/clip-vit-large-patch14"
  clip_dtype: "bf16"
  clip_do_center_crop: false # false면 CLIP dense score를 full-frame 기준으로 계산
  total_budget: null
  keep_ratio: 0.3
  temperature: 0.4
  patch_score_threshold: 0.02
  selection_mode: "naive_mean"
  window_size: 4
  window_stride: 2
  aggregation: "max"
  batch_size: ${frame_selection.threshold}
  spatial_merge_size: null
  device: null

patch_selection_dpc_ddps:
  _target_: model.FrameSelection.DPC.dpc_ddps_patch_selection
  _partial_: true
  query_file: ${invoke.query_file}
  clip_model_name: "openai/clip-vit-large-patch14"
  clip_dtype: "bf16"
  clip_do_center_crop: false # DPC에서 캐시한 CLIP dense score를 우선 사용
  total_budget: null
  keep_ratio: 0.3
  temperature: 0.4
  patch_score_threshold: 0.02
  selection_mode: "naive_mean"
  window_size: 4
  window_stride: 2
  aggregation: "max"
  batch_size: ${frame_selection.threshold}
  spatial_merge_size: null
  device: null

vlm:
  _target_: model.FrameSelection.DPC.DPCVLM
  model_id: "Qwen/Qwen3-VL-8B-Instruct"
  backend: "qwen3_vl"
  dtype: "bf16"
  quantization:
    enabled: false
    mode: "4bit"
    skip_vision_encoder: true
    skip_modules: []
    kwargs:
      bnb_4bit_compute_dtype: "bf16"
      bnb_4bit_quant_type: "nf4"
      bnb_4bit_use_double_quant: true
      llm_int8_threshold: 6.0
      llm_int8_enable_fp32_cpu_offload: false
  frame_selector: ${frame_selection}
  patch_selector: ${patch_selection_dpc_ddps}
  duplicate_factor: 1 # DPC_DDPS는 patch selection 입력 프레임 수를 threshold로 유지
  duplicate_for_qwen_only: true
  processor_kwargs: {}
  model_kwargs: {}
  local_model_dir: "./model/repo"
  generation_kwargs:
    do_sample: false
    max_new_tokens: 128

invoke:
  video_path: "./data/Mcst74e8S9U.mp4"
  prompt_file: "model/base/prompt.txt"
  query_file: "model/base/query.txt"
  print_config: false
  quiet_model_loading: false
