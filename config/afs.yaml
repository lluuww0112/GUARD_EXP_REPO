defaults:
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled

hydra:
  job:
    chdir: false
  output_subdir: null
  run:
    dir: .

frame_selection:
  _target_: model.FrameSelection.AFS.adaptive_frame_sampling
  _partial_: true
  num_frames: 10
  metric: "ofvd" # Enum["ofvd", "ssvd"]
  candidate_frames: null # null이면 num_frames * candidate_multiplier 개를 균등 후보로 사용
  candidate_multiplier: 4
  max_side: 720
  ensure_qwen_compatibility: true
  random_seed: 42
  farneback_pyr_scale: 0.5
  farneback_levels: 3
  farneback_winsize: 15
  farneback_iterations: 3
  farneback_poly_n: 5
  farneback_poly_sigma: 1.2
  farneback_flags: 0

patch_selection: null

vlm:
  _target_: model.base.BaseVLM
  model_id: "Qwen/Qwen3-VL-8B-Instruct"
  backend: "qwen3_vl"
  dtype: "bf16"
  quantization:
    enabled: true
    mode: "4bit"
    skip_vision_encoder: true
    skip_modules: []
    kwargs:
      bnb_4bit_compute_dtype: "bf16"
      bnb_4bit_quant_type: "nf4"
      bnb_4bit_use_double_quant: true
      llm_int8_threshold: 6.0
      llm_int8_enable_fp32_cpu_offload: false
  frame_selector: ${frame_selection}
  patch_selector: ${patch_selection}
  duplicate_factor: 2 # 1이면 프레임 복사 비활성
  duplicate_for_qwen_only: true
  processor_kwargs: {}
  model_kwargs: {}
  local_model_dir: "./model/repo"
  generation_kwargs:
    do_sample: false
    max_new_tokens: 128

invoke:
  video_path: "./data/Mcst74e8S9U.mp4"
  prompt_file: "model/base/prompt.txt"
  query_file: "model/base/query.txt"
  print_config: false
  quiet_model_loading: false
